---
name: lint-gha-reviewdog
description: Run GitHub Actions linters and report findings

inputs:
  toolset:
    description: Linter set to run
    required: false
    default: all
  reporter:
    description: reviewdog reporter
    required: false
    default: github-pr-review
  filter_mode:
    description: reviewdog filter mode
    required: false
    default: added
  workdir:
    description: Directory to lint
    required: false
    default: .
  fail_on_error:
    description: Fail the step when findings exist
    required: false
    default: "true"
  github_token:
    description: GitHub token for reviewdog
    required: false
    default: ""

outputs:
  has_findings:
    description: Whether any enabled tool reported findings
    value: ${{ steps.result.outputs.has_findings }}

runs:
  using: composite
  steps:
    - id: validate
      name: Validate inputs
      shell: bash
      env:
        TOOLSET: ${{ inputs.toolset }}
      run: |
        set -euo pipefail
        case "${TOOLSET}" in
          all|actionlint|zizmor|ghalint)
            ;;
          *)
            echo "Unsupported toolset: ${TOOLSET}" >&2
            exit 1
            ;;
        esac

    - name: Install aqua
      uses: aquaproj/aqua-installer@11dd79b4e498d471a9385aa9fb7f62bb5f52a73c # v4.0.4
      with:
        aqua_version: v2.56.7
        working_directory: ${{ github.action_path }}

    - id: run_actionlint
      name: Run actionlint with reviewdog
      if: ${{ inputs.toolset == 'all' || inputs.toolset == 'actionlint' }}
      shell: bash
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        REVIEWDOG_GITHUB_API_TOKEN: ${{ inputs.github_token }}
        REPORTER: ${{ inputs.reporter }}
        FILTER_MODE: ${{ inputs.filter_mode }}
        WORKDIR: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        status=0
        findings=false
        tmp_log="$(mktemp)"
        actual_reporter="${REPORTER}"
        if [ "${GITHUB_EVENT_NAME}" != "pull_request" ] && [ "${actual_reporter}" = "github-pr-review" ]; then
          actual_reporter="github-check"
        fi
        if (
          cd "${GITHUB_WORKSPACE}/${WORKDIR}"
          aqua exec -- actionlint -color=false -oneline .
        ) 2>&1 | tee "${tmp_log}" | aqua exec -- reviewdog \
          -f=actionlint \
          -name="actionlint" \
          -reporter="${actual_reporter}" \
          -filter-mode="${FILTER_MODE}" \
          -fail-level=none; then
          status=0
        else
          status=$?
        fi

        if [ -s "${tmp_log}" ]; then
          findings=true
        fi

        /bin/bash "${GITHUB_ACTION_PATH}/scripts/write-summary.sh" \
          "actionlint" \
          "${findings}" \
          "aqua exec -- actionlint -color=false -oneline . | aqua exec -- reviewdog ..." \
          "${tmp_log}"

        {
          echo "has_findings=${findings}"
          echo "lint_exit_code=${status}"
        } >> "${GITHUB_OUTPUT}"

    - id: run_zizmor
      name: Run zizmor
      if: ${{ inputs.toolset == 'all' || inputs.toolset == 'zizmor' }}
      shell: bash
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        WORKDIR: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        status=0
        findings=false
        tmp_log="$(mktemp)"
        if (
          cd "${GITHUB_WORKSPACE}/${WORKDIR}"
          aqua exec -- zizmor .
        ) >"${tmp_log}" 2>&1; then
          status=0
        else
          status=$?
        fi

        if [ "${status}" -ne 0 ] || [ -s "${tmp_log}" ]; then
          findings=true
        fi

        /bin/bash "${GITHUB_ACTION_PATH}/scripts/write-summary.sh" \
          "zizmor" \
          "${findings}" \
          "aqua exec -- zizmor ." \
          "${tmp_log}"

        {
          echo "has_findings=${findings}"
          echo "lint_exit_code=${status}"
        } >> "${GITHUB_OUTPUT}"

    - id: run_ghalint
      name: Run ghalint
      if: ${{ inputs.toolset == 'all' || inputs.toolset == 'ghalint' }}
      shell: bash
      env:
        AQUA_CONFIG: ${{ github.action_path }}/aqua.yaml
        WORKDIR: ${{ inputs.workdir }}
      run: |
        set -euo pipefail
        status=0
        findings=false
        tmp_log="$(mktemp)"
        if (
          cd "${GITHUB_WORKSPACE}/${WORKDIR}"
          aqua exec -- ghalint run
        ) >"${tmp_log}" 2>&1; then
          status=0
        else
          status=$?
        fi

        if [ "${status}" -ne 0 ] || [ -s "${tmp_log}" ]; then
          findings=true
        fi

        /bin/bash "${GITHUB_ACTION_PATH}/scripts/write-summary.sh" \
          "ghalint" \
          "${findings}" \
          "aqua exec -- ghalint run" \
          "${tmp_log}"

        {
          echo "has_findings=${findings}"
          echo "lint_exit_code=${status}"
        } >> "${GITHUB_OUTPUT}"

    - id: result
      name: Finalize result
      shell: bash
      env:
        TOOLSET: ${{ inputs.toolset }}
        FAIL_ON_ERROR: ${{ inputs.fail_on_error }}
        ACTIONLINT_FINDINGS: ${{ steps.run_actionlint.outputs.has_findings }}
        ACTIONLINT_EXIT_CODE: ${{ steps.run_actionlint.outputs.lint_exit_code }}
        ZIZMOR_FINDINGS: ${{ steps.run_zizmor.outputs.has_findings }}
        ZIZMOR_EXIT_CODE: ${{ steps.run_zizmor.outputs.lint_exit_code }}
        GHALINT_FINDINGS: ${{ steps.run_ghalint.outputs.has_findings }}
        GHALINT_EXIT_CODE: ${{ steps.run_ghalint.outputs.lint_exit_code }}
      run: |
        set -euo pipefail
        has_findings=false
        unexpected_exit_code=0

        for findings in \
          "${ACTIONLINT_FINDINGS:-false}" \
          "${ZIZMOR_FINDINGS:-false}" \
          "${GHALINT_FINDINGS:-false}"; do
          if [ "${findings}" = "true" ]; then
            has_findings=true
            break
          fi
        done

        for result in \
          "${ACTIONLINT_FINDINGS:-false}:${ACTIONLINT_EXIT_CODE:-0}" \
          "${ZIZMOR_FINDINGS:-false}:${ZIZMOR_EXIT_CODE:-0}" \
          "${GHALINT_FINDINGS:-false}:${GHALINT_EXIT_CODE:-0}"; do
          findings="${result%%:*}"
          exit_code="${result##*:}"
          if [ "${exit_code}" -ne 0 ] && [ "${findings}" != "true" ]; then
            unexpected_exit_code="${exit_code}"
            break
          fi
        done

        echo "has_findings=${has_findings}" >> "${GITHUB_OUTPUT}"

        if [ "${FAIL_ON_ERROR}" = "true" ] && [ "${has_findings}" = "true" ]; then
          exit 1
        fi

        if [ "${unexpected_exit_code}" -ne 0 ]; then
          exit "${unexpected_exit_code}"
        fi
